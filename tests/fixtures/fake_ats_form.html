<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Apply — FakeCorp ATS</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; font-size: 14px; margin-top: 12px; }
    input, textarea { width: 100%; padding: 8px; font-size: 14px; }
    button { margin-top: 16px; padding: 10px 18px; font-size: 14px; }
    .thanks { display: none; padding: 1rem; background: #e8f8e8; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Apply: AI Ops Engineer</h1>
  <form id="apply-form" onsubmit="onSubmit(event)">
    <label>
      Full name
      <input id="name" name="full_name" type="text" />
    </label>
    <label>
      Email
      <input id="email" name="email" type="email" />
    </label>
    <label>
      Phone
      <input id="phone" name="phone" type="tel" />
    </label>
    <label>
      Resume
      <input id="resume" name="resume" type="file" />
    </label>
    <label>
      Cover letter
      <textarea id="cover" name="cover_letter" rows="6"></textarea>
    </label>
    <button type="submit" id="submit-btn">Submit application</button>
  </form>
  <div class="thanks" id="thanks">Thanks — your application was received.</div>
  <script>
    function onSubmit(e) {
      e.preventDefault();
      document.getElementById('apply-form').style.display = 'none';
      document.getElementById('thanks').style.display = 'block';
      // Mark URL change so tests can detect submission.
      history.replaceState(null, '', '?submitted=1');
    }
  </script>
</body>
</html>
