name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install
        run: pip install -e ".[dev]"
      - name: lint
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: type
        run: mypy src/applyops
      - name: pytest (unit, not eval, not live)
        run: pytest -q -m "not eval and not live"

  evals:
    name: rubric evals
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install
        run: pip install -e ".[dev]"
      - name: pytest (eval rubrics)
        run: pytest -q -m eval --tb=short
